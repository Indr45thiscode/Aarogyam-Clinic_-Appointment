{% extends 'base.html' %}
{% block title %}Book Appointment - Clinic{% endblock %}
{% block page_title %}Book Appointment{% endblock %}

{% block content %}

<a href="/appointments/" style="display: inline-flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 14px; text-decoration: none; margin-bottom: 24px;">
    <i class="fas fa-arrow-left"></i> Back to Appointments
</a>

<div class="row justify-content-center">
    <div class="col-md-7">
        <div style="background: #1e293b; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 36px;">

            <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 30px;">
                <div style="width: 48px; height: 48px; background: linear-gradient(135deg, #f59e0b, #b45309); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white;">
                    <i class="fas fa-calendar-plus"></i>
                </div>
                <div>
                    <div style="font-size: 18px; font-weight: 700; color: white;">New Appointment</div>
                    <div style="font-size: 13px; color: #94a3b8;">Fill in the appointment details</div>
                </div>
            </div>

            <form method="post">
                {% csrf_token %}

                <!-- Patient -->
                <div class="mb-3">
                    <label style="display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Patient *</label>
                    <select name="patient" required style="width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: white; padding: 12px 14px; font-size: 14px; outline: none; cursor: pointer;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                        <option value="" style="background:#1e293b">-- Select Patient --</option>
                        {% for patient in patients %}
                        <option value="{{ patient.pk }}" style="background:#1e293b">{{ patient.first_name }} {{ patient.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Doctor -->
                <div class="mb-3">
                    <label style="display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Doctor *</label>
                    <select name="doctor" id="doctorSelect" required style="width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: white; padding: 12px 14px; font-size: 14px; outline: none; cursor: pointer;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                        <option value="" style="background:#1e293b">-- Select Doctor --</option>
                        {% for doctor in doctors %}
                        <option value="{{ doctor.pk }}" style="background:#1e293b">Dr. {{ doctor.first_name }} {{ doctor.last_name }} - {{ doctor.specialization }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Date -->
                <div class="mb-3">
                    <label style="display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Appointment Date *</label>
                    <input type="date" name="appointment_date" id="dateInput" required
                        style="width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: white; padding: 12px 14px; font-size: 14px; outline: none; color-scheme: dark;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
                        min="{{ today }}">
                </div>

                <!-- Time Slot -->
                <div class="mb-3">
                    <label style="display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Time Slot *</label>
                    <select name="time_slot" id="timeSlot" required style="width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: white; padding: 12px 14px; font-size: 14px; outline: none; cursor: pointer;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                        <option value="">-- Select Doctor and Date first --</option>
                        {% for slot in time_slots %}
                        <option value="{{ slot.0 }}" style="background:#1e293b">{{ slot.1 }}</option>
                        {% endfor %}
                    </select>
                    <div id="slotStatus" style="font-size: 12px; color: #64748b; margin-top: 6px;"></div>
                </div>

                <!-- Notes -->
                <div class="mb-4">
                    <label style="display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Notes <span style="color: #64748b; font-weight: 400;">(Optional)</span></label>
                    <textarea name="notes" rows="3" placeholder="Add any notes here..."
                        style="width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: white; padding: 12px 14px; font-size: 14px; outline: none; resize: vertical;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'"></textarea>
                </div>

                <div style="display: flex; gap: 12px;">
                    <button type="submit" style="flex: 1; padding: 13px; background: linear-gradient(135deg, #f59e0b, #b45309); border: none; border-radius: 10px; color: white; font-size: 15px; font-weight: 700; cursor: pointer;">
                        <i class="fas fa-calendar-check me-2"></i>Book Appointment
                    </button>
                    <a href="/appointments/" style="padding: 13px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #94a3b8; font-size: 14px; font-weight: 600; text-decoration: none; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function loadSlots() {
    const doctor = document.getElementById('doctorSelect').value;
    const date = document.getElementById('dateInput').value;
    const slotSelect = document.getElementById('timeSlot');
    const slotStatus = document.getElementById('slotStatus');

    if (!doctor || !date) return;

    slotStatus.textContent = 'Loading available slots...';

    fetch(`/api/available-slots/?doctor_id=${doctor}&date=${date}`)
        .then(r => r.json())
        .then(data => {
            slotSelect.innerHTML = '<option value="">-- Select a Time Slot --</option>';
            data.slots.forEach(slot => {
                const opt = document.createElement('option');
                opt.value = slot.value;
                opt.style.background = '#1e293b';
                if (slot.booked) {
                    opt.textContent = slot.label + ' (Booked)';
                    opt.disabled = true;
                    opt.style.color = '#ef4444';
                } else {
                    opt.textContent = slot.label + ' ✓ Available';
                    opt.style.color = '#10b981';
                }
                slotSelect.appendChild(opt);
            });
            const available = data.slots.filter(s => !s.booked).length;
            slotStatus.textContent = `${available} slot(s) available`;
            slotStatus.style.color = available > 0 ? '#10b981' : '#ef4444';
        });
}

document.getElementById('doctorSelect').addEventListener('change', loadSlots);
document.getElementById('dateInput').addEventListener('change', loadSlots);
</script>

{% endblock %}

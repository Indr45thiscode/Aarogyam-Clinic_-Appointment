<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinic Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: #0ea5e9;
            top: -150px; left: -150px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: #6366f1;
            bottom: -100px; right: -100px;
            animation-delay: 3s;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: #10b981;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Grid pattern overlay */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 48px 44px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 32px 64px rgba(0,0,0,0.5);
        }

        /* Brand */
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 36px;
            justify-content: center;
        }

        .brand-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            box-shadow: 0 8px 20px rgba(14,165,233,0.35);
        }

        .brand-info { text-align: left; }

        .brand-name {
            font-size: 18px;
            font-weight: 800;
            color: white;
            line-height: 1.2;
        }

        .brand-sub {
            font-size: 12px;
            color: #64748b;
            font-weight: 400;
        }

        /* Heading */
        .login-heading {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-heading h2 {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 6px;
        }

        .login-heading p {
            font-size: 14px;
            color: #64748b;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin-bottom: 32px;
        }

        /* Form Fields */
        .field-group {
            margin-bottom: 20px;
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        .field-label i {
            font-size: 11px;
            color: #0ea5e9;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: white;
            padding: 14px 18px;
            font-size: 15px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
            -webkit-text-fill-color: white;
        }

        .field-input::placeholder {
            color: #334155;
            font-weight: 400;
        }

        .field-input:focus {
            border-color: #0ea5e9;
            background: rgba(14,165,233,0.06);
            box-shadow: 0 0 0 4px rgba(14,165,233,0.1);
        }

        /* Fix autofill */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px #0f1e35 inset !important;
            -webkit-text-fill-color: white !important;
            border-color: rgba(255,255,255,0.08) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Submit Button */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(14,165,233,0.3);
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(14,165,233,0.4);
        }

        .btn-login:hover::before { opacity: 1; }

        .btn-login:active { transform: translateY(0); }

        /* Error */
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 12px;
            padding: 13px 16px;
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Footer note */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #334155;
        }

        .login-footer span {
            color: #0ea5e9;
        }
    </style>
</head>
<body>

<!-- Background blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-heartbeat"></i>
            </div>
            <div class="brand-info">
                <div class="brand-name">Clinic Dashboard</div>
                <div class="brand-sub">Management System</div>
            </div>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Heading -->
        <div class="login-heading">
            <h2>Welcome back! 👋</h2>
            <p>Sign in to your account to continue</p>
        </div>

        <!-- Error -->
        {% if form.errors %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <!-- Form -->
        <form method="post">
            {% csrf_token %}

            <div class="field-group">
                <div class="field-label">
                    <i class="fas fa-user"></i> Username
                </div>
                <div class="field-input-wrap">
                    <input
                        type="text"
                        name="username"
                        class="field-input"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required>
                </div>
            </div>

            <div class="field-group">
                <div class="field-label">
                    <i class="fas fa-lock"></i> Password
                </div>
                <div class="field-input-wrap">
                    <input
                        type="password"
                        name="password"
                        class="field-input"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i> Sign In
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            Powered by <span>Clinic Management System</span>
        </div>

    </div>
</div>

</body>
</html>

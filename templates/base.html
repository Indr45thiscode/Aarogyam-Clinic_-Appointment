<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Clinic Dashboard{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --secondary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark2: #1e293b;
            --dark3: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--dark2);
            border-right: 1px solid rgba(255,255,255,0.07);
            z-index: 100;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }

        .brand-sub {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .sidebar-section {
            padding: 20px 16px 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .nav-item { padding: 2px 8px; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(14, 165, 233, 0.12);
            color: var(--primary);
        }

        .nav-link i { width: 18px; text-align: center; font-size: 15px; }

        /* MAIN CONTENT */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 24px;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .topbar-title {
            font-size: 22px;
            font-weight: 700;
            color: white;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            cursor: pointer;
        }

        /* STAT CARDS */
        .stat-card {
            border-radius: 16px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .stat-card:hover { transform: translateY(-3px); }

        .stat-card.blue { background: linear-gradient(135deg, #0ea5e9, #0369a1); }
        .stat-card.green { background: linear-gradient(135deg, #10b981, #047857); }
        .stat-card.yellow { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .stat-card.red { background: linear-gradient(135deg, #ef4444, #b91c1c); }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            opacity: 0.2;
        }

        /* QUICK ACTION CARDS */
        .action-card {
            background: var(--dark2);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
            color: var(--text);
        }

        .action-card:hover {
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.08);
            transform: translateY(-2px);
            color: var(--text);
        }

        .action-icon {
            width: 54px; height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 22px;
            color: white;
        }

        .action-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* SECTION TITLE */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        /* CARD */
        .dash-card {
            background: var(--dark2);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 20px;
        }
       .page-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
.main-content {
    flex: 1;
}
    </style>
</head>
<body>

<!-- SIDEBAR -->
 <div class="page-wrapper">
<div class="sidebar">
    <div class="sidebar-brand">
    <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
    <div>
        <div class="brand-name">Aarogyam Clinic</div>
        <div class="brand-sub">Multi-Speciality Clinic</div>
    </div>
</div>

    <div class="sidebar-section">Main</div>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="/dashboard/" class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a href="/appointments/" class="nav-link {% if request.path == '/appointments/' %}active{% endif %}">
                <i class="fas fa-calendar-check"></i> Appointments
            </a>
        </li>
    </ul>

    <div class="sidebar-section">People</div>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="/doctors/" class="nav-link {% if request.path == '/doctors/' %}active{% endif %}">
                <i class="fas fa-user-md"></i> Doctors
            </a>
        </li>
        <li class="nav-item">
            <a href="/patients/" class="nav-link {% if request.path == '/patients/' %}active{% endif %}">
                <i class="fas fa-users"></i> Patients
            </a>
        </li>
    </ul>

    <div class="sidebar-section">Analytics</div>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="/analytics/" class="nav-link {% if request.path == '/analytics/' %}active{% endif %}">
                <i class="fas fa-chart-bar"></i> Analytics
            </a>
        </li>
        <li class="nav-item">
            <a href="/reports/" class="nav-link">
                <i class="fas fa-file-medical"></i> Reports
            </a>
        </li>
    </ul>

    <div class="sidebar-section">Admin</div>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="/admin/" class="nav-link">
                <i class="fas fa-cog"></i> Admin Panel
            </a>
        </li>
        <li class="nav-item">
            <a href="/logout/" class="nav-link">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="main-content" >
    <div class="topbar">
        <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
        <div class="topbar-right">
            <div class="avatar">AD</div>
        </div>
    </div>

    {% block content %}{% endblock %}

    <!-- FOOTER -->

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</div> <!-- page-wrapper -->
</body>
</html>
